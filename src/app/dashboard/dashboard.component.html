<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Dashboard</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div *ngIf="summary() as s; else loading">
    <ion-card>
      <ion-card-header class="ion-text-center">
        <ion-card-subtitle>Total Estimated Cost</ion-card-subtitle>
        <ion-card-title>{{ s.totalCost | currency:'EUR' }}</ion-card-title>
      </ion-card-header>
    </ion-card>

    <ion-card *ngIf="s.costByMonth.length > 0">
      <ion-card-header>
        <ion-card-title>Cost by Month</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <ngx-charts-bar-vertical
          [view]="view"
          [scheme]="colorScheme"
          [results]="s.costByMonth"
          [gradient]="gradient"
          [xAxis]="showXAxis"
          [yAxis]="showYAxis"
          [legend]="showLegend"
          [showXAxisLabel]="showXAxisLabel"
          [showYAxisLabel]="showYAxisLabel"
          [xAxisLabel]="xAxisLabel"
          [yAxisLabel]="yAxisLabel">
        </ngx-charts-bar-vertical>
      </ion-card-content>
    </ion-card>

    <ion-card *ngIf="s.countByCategory.length > 0">
      <ion-card-header>
        <ion-card-title>Items by Category</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <ngx-charts-pie-chart
          [view]="view"
          [scheme]="colorScheme"
          [results]="s.countByCategory"
          [legend]="showLegend"
          [labels]="true"
          [doughnut]="false">
        </ngx-charts-pie-chart>
      </ion-card-content>
    </ion-card>

    <div *ngIf="s.costByMonth.length === 0 && s.countByCategory.length === 0" class="ion-text-center ion-padding">
      <p>No planned items to display in dashboard.</p>
    </div>
  </div>

  <ng-template #loading>
    <div class="h-full flex justify-center items-center">
      <ion-spinner></ion-spinner>
    </div>
  </ng-template>
</ion-content>

<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Boîte de réception</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div *ngIf="items().length === 0" class="ion-text-center ion-padding">
    <ion-icon name="archive-outline" size="large" class="text-gray-400"></ion-icon>
    <p class="ion-padding-top">Votre boîte de réception est vide.</p>
  </div>

  <ion-grid *ngIf="items().length > 0">
    <ion-row>
      <ion-col *ngFor="let item of items()" size="12" size-md="6" size-lg="4">
        <ion-card>
          <!-- Section pour l'image -->
          <ng-container *ngIf="item.imageUrls && item.imageUrls.length > 0; else noImagePlaceholder">
            <img [src]="item.imageUrls[0]" alt="Image de {{ item.name }}" class="h-48 w-full object-cover" />
          </ng-container>
          <ng-template #noImagePlaceholder>
            <div class="h-48 w-full bg-gray-100 flex items-center justify-center">
              <ion-icon name="image-outline" size="large" class="text-gray-400"></ion-icon>
            </div>
          </ng-template>

          <ion-card-content>
            <form #form="ngForm" (ngSubmit)="planItem(item)">
              <ion-list>
                <ion-item>
                  <ion-input label="Name" label-placement="stacked" type="text" name="name" [(ngModel)]="item.name" required></ion-input>
                </ion-item>
                <ion-item>
                  <ion-input label="Estimated Cost" label-placement="stacked" type="number" name="estimatedCost" [(ngModel)]="item.estimatedCost" required></ion-input>
                </ion-item>
                <ion-item>
                  <ion-select label="Category" label-placement="stacked" name="category" [(ngModel)]="item.category" required interface="action-sheet">
                    <ion-select-option value="Vêtement">Vêtement</ion-select-option>
                    <ion-select-option value="Chaussures">Chaussures</ion-select-option>
                    <ion-select-option value="Parfum">Parfum</ion-select-option>
                  </ion-select>
                </ion-item>
                <ion-item>
                  <ion-select label="Priority" label-placement="stacked" name="priority" [(ngModel)]="item.priority" required interface="action-sheet">
                    <ion-select-option value="Haute">Haute</ion-select-option>
                    <ion-select-option value="Moyenne">Moyenne</ion-select-option>
                    <ion-select-option value="Basse">Basse</ion-select-option>
                  </ion-select>
                </ion-item>
                <ion-item>
                  <ion-input label="Purchase Month" label-placement="stacked" type="month" name="purchaseMonth" [(ngModel)]="item.purchaseMonth" required></ion-input>
                </ion-item>
              </ion-list>
              <ion-button class="ion-margin-top" type="submit" [disabled]="form.invalid" expand="block">
                Planifier
                <ion-icon slot="end" name="arrow-forward-outline"></ion-icon>
              </ion-button>
            </form>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>

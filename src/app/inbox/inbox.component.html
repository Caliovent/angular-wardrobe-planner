<div class="container mx-auto p-4">
  <h2 class="text-2xl font-bold mb-4">Inbox</h2>
  <div *ngIf="items().length === 0" class="text-gray-500">
    Your inbox is empty.
  </div>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    <div *ngFor="let item of items()" class="bg-white p-4 rounded-lg shadow">
      <form #form="ngForm" (ngSubmit)="planItem(item)">
        <div class="mb-2">
          <label class="block text-sm font-medium text-gray-700">Name</label>
          <input type="text" name="name" [(ngModel)]="item.name" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50" required>
        </div>
        <div class="mb-2">
          <label class="block text-sm font-medium text-gray-700">Estimated Cost</label>
          <input type="number" name="estimatedCost" [(ngModel)]="item.estimatedCost" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50" required>
        </div>
        <div class="mb-2">
          <label class="block text-sm font-medium text-gray-700">Category</label>
          <select name="category" [(ngModel)]="item.category" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50" required>
            <option value="Vêtement">Vêtement</option>
            <option value="Chaussures">Chaussures</option>
            <option value="Parfum">Parfum</option>
          </select>
        </div>
        <div class="mb-2">
          <label class="block text-sm font-medium text-gray-700">Priority</label>
          <select name="priority" [(ngModel)]="item.priority" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50" required>
            <option value="Haute">Haute</option>
            <option value="Moyenne">Moyenne</option>
            <option value="Basse">Basse</option>
          </select>
        </div>
        <div class="mb-2">
          <label class="block text-sm font-medium text-gray-700">Purchase Month</label>
          <input type="month" name="purchaseMonth" [(ngModel)]="item.purchaseMonth" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50" required>
        </div>
        <button type="submit" [disabled]="form.invalid" class="w-full bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
          Planifier
        </button>
      </form>
    </div>
  </div>
</div>
